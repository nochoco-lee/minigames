                {word: "butterfly", emoji: "🦋"}, {word: "dragonfly", emoji: "🛸"}, {word: "chocolate", emoji: "🍫"},
                {word: "spaghetti", emoji: "🍝"}, {word: "hamburger", emoji: "🍔"}, {word: "calculator", emoji: "🧮"},
                {word: "saxophone", emoji: "🎷"}, {word: "castle", emoji: "🏰"}, {word: "lighthouse", emoji: "🚨"},
                {word: "fireworks", emoji: "🎆"}, {word: "astronaut", emoji: "👨‍🚀"}, {word: "hedgehog", emoji: "🦔"},
                {word: "flamingo", emoji: "🦩"}, {word: "chameleon", emoji: "🦎"}, {word: "kiwifruit", emoji: "🥝"},
                {word: "pancake", emoji: "🥞"}, {word: "scooter", emoji: "🛴"}, {word: "paragliding", emoji: "🪂"},
                {word: "earthquake", emoji: "🌋"}, {word: "snowman", emoji: "⛄"}
            ]
        };

        // --- 오디오 및 타이머 상태 변수 ---
        let audioCtx = null;
        let bgmIntervalId = null;
        let bgmNoteIndex = 0;
        let bgmEnabled = true;
        let timerIntervalId = null;

        const bgmMelody = [
            329.63, 392.00, 523.25, 392.00, 440.00, 523.25, 392.00, 349.23,
            329.63, 261.63, 293.66, 329.63, 293.66, 0,       293.66, 349.23,
            392.00, 440.00, 523.25, 587.33, 659.25, 523.25, 440.00, 392.00,
            349.23, 329.63, 293.66, 329.63, 261.63, 0,       261.63, 392.00
        ];

        // --- 핵심 돔 노드 컴포넌트 ---
        const scoreText = document.getElementById("score-text");
        const levelText = document.getElementById("level-text");
        const timeText = document.getElementById("time-text");
        const timerBar = document.getElementById("timer-bar");
        const statusDisplay = document.getElementById("status-display");
        const pauseBtn = document.getElementById("pause-btn");
        const pauseOverlay = document.getElementById("pause-overlay");
        const startScreen = document.getElementById("start-screen");
        const gameoverScreen = document.getElementById("gameover-screen");
        const startLevelInput = document.getElementById("start-level-input");
        const cardGrid = document.getElementById("card-grid");

        let score = 0;
        let level = 1;
        let timeLeft = 0;
        let maxTime = 0;
        let gameActive = false;
        let isPaused = false;

        let selectedDifficulty = "easy";
        let scoreMultiplier = 1;

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 0;
        let lockBoard = false;

        function initAudioCtx() {
            try {
                if (!audioCtx) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (AudioContextClass) audioCtx = new AudioContextClass();
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) { console.warn(e); }
        }

        function startBgm() {
            if (!bgmEnabled || isPaused || !gameActive) return;
            if (bgmIntervalId) return;
            initAudioCtx(); if (!audioCtx) return;

            bgmIntervalId = setInterval(() => {
                if (!gameActive || isPaused || !bgmEnabled || !audioCtx) { stopBgm(); return; }
                try {
                    let freq = bgmMelody[bgmNoteIndex % bgmMelody.length];
                    bgmNoteIndex++;
                    if (freq === 0) return;

                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.015, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.16);
                    
                    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.18);
                } catch(e) {}
            }, 200);
        }

        function stopBgm() {
            if (bgmIntervalId) { clearInterval(bgmIntervalId); bgmIntervalId = null; }
        }

        function toggleBgm() {
            bgmEnabled = !bgmEnabled;
            const topBgmBtn = document.getElementById("bgm-top-toggle");
            if (bgmEnabled) {
                topBgmBtn.innerHTML = "🎵 음악 ON";
                topBgmBtn.className = "text-sm bg-white hover:bg-purple-100 text-purple-700 font-bold px-2.5 py-1 rounded-xl border border-purple-300 shadow-sm transition active:scale-95 cursor-pointer whitespace-nowrap";
                if (gameActive && !isPaused && !lockBoard) startBgm();
            } else {
                topBgmBtn.innerHTML = "🔇 음악 OFF";
                topBgmBtn.className = "text-sm bg-white hover:bg-purple-100 text-gray-400 font-bold px-2.5 py-1 rounded-xl border border-gray-300 shadow-sm transition active:scale-95 cursor-pointer whitespace-nowrap";
                stopBgm();
            }
        }

        function playSound(type) {
            try {
                initAudioCtx(); if (!audioCtx) return;
                const now = audioCtx.currentTime;

                if (type === 'match') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(783.99, now + 0.08);
                    gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.25);
                } else if (type === 'wrong') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(261.63, now); osc.frequency.linearRampToValueAtTime(130.81, now + 0.2);
                    gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'fail') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(60, now + 0.4);
                    gain.gain.setValueAtTime(0.18, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'levelup') {
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((f, idx) => {
                        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        osc.type = 'square'; osc.frequency.setValueAtTime(f, now + idx * 0.06);
                        g.gain.setValueAtTime(0.06, now + idx * 0.06); g.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.06 + 0.15);
                        osc.connect(g); g.connect(audioCtx.destination); osc.start(now + idx * 0.06); osc.stop(now + idx * 0.06 + 0.15);
                    });
                }
            } catch(e) {}
        }

        // --- 실시간 타이머 엔진 구동부 ---
        function startTimer() {
            if (!gameActive || isPaused || lockBoard) return;
            if (timerIntervalId) return;

            timerIntervalId = setInterval(() => {
                if (!gameActive || isPaused || lockBoard) { stopTimer(); return; }
                
                timeLeft--;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    updateTimerUI();
                    endGame();
                } else {
                    updateTimerUI();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerIntervalId) { clearInterval(timerIntervalId); timerIntervalId = null; }
        }

        function updateTimerUI() {
            timeText.innerText = timeLeft;
            if (maxTime > 0) {
                const percentage = (timeLeft / maxTime) * 100;
                timerBar.style.width = `${percentage}%`;
                
                // 시간이 25% 미만으로 떨어지면 경고 (붉은색 바 연출)
                if (percentage < 25) {
                    timerBar.className = "bg-red-500 h-full transition-all duration-300";
                } else {
                    timerBar.className = "bg-gradient-to-r from-red-500 to-fuchsia-500 h-full transition-all duration-300";
                }
            }
        }

        function createCardElement(card, index) {
            const container = document.createElement("div");
            container.className = "perspective w-full h-full cursor-pointer aspect-[3/4] select-none";
            container.dataset.index = index;

            const inner = document.createElement("div");
            inner.className = "card-inner relative w-full h-full transition-transform duration-300 preserve-3d shadow-md rounded-2xl border-2 border-purple-300";
            inner.id = `card-inner-${index}`;

            const front = document.createElement("div");
            front.className = "absolute inset-0 bg-gradient-to-br from-purple-500 to-indigo-600 text-white rounded-2xl flex flex-col items-center justify-center backface-hidden";
            front.innerHTML = `<span class="text-xl md:text-2xl">🔮</span>`;

            const back = document.createElement("div");
            back.className = "absolute inset-0 bg-white border-2 border-purple-400 rounded-2xl flex flex-col items-center justify-center backface-hidden rotate-y-180 p-1 text-center";
            
            if (card.type === "emoji") {
                back.innerHTML = `<span class="text-3xl md:text-4xl select-none">${card.content}</span>`;
            } else {
                back.innerHTML = `<span class="text-xs md:text-sm font-bold text-purple-950 uppercase tracking-tight break-all px-0.5">${card.content}</span>`;
            }

            inner.appendChild(front); inner.appendChild(back);
            container.appendChild(inner);

            container.addEventListener("click", () => handleCardClick(index));
            return container;
        }

        function startGame() {
            initAudioCtx();
            stopTimer();
            
            const diffRadio = document.querySelector('input[name="wordDifficulty"]:checked');
            selectedDifficulty = diffRadio ? diffRadio.value : "easy";
            
            if (selectedDifficulty === "easy") scoreMultiplier = 1;
            else if (selectedDifficulty === "normal") scoreMultiplier = 2;
            else if (selectedDifficulty === "hard") scoreMultiplier = 3;

            score = 0;
            level = parseInt(startLevelInput.value) || 1;

            scoreText.innerText = score;
            levelText.innerText = level;

            startScreen.classList.add("hidden");
            gameoverScreen.classList.add("hidden");
            pauseOverlay.classList.add("hidden");

            pauseBtn.disabled = false; isPaused = false;
            pauseBtn.innerHTML = "⏸️ 일시정지";
            pauseBtn.className = "px-5 bg-fuchsia-500 hover:bg-fuchsia-600 text-white font-bold rounded-xl shadow transition transform active:scale-95 cursor-pointer whitespace-nowrap";

            gameActive = true; bgmNoteIndex = 0;
            
            buildRoundData();
        }

        function buildRoundData() {
            stopTimer();
            matchedPairs = 0; flippedCards = []; lockBoard = true;

            if (level === 1) totalPairs = 3;       
            else if (level === 2) totalPairs = 4;  
            else if (level === 3) totalPairs = 6;  
            else if (level === 4) totalPairs = 8;  
            else if (level === 5) totalPairs = 10; 
            else totalPairs = 12;                  

            // 완벽히 계산된 유동적 제한시간 수식 설정
            maxTime = 20 + (totalPairs * 5); 
            timeLeft = maxTime;
            updateTimerUI();

            cardGrid.innerHTML = "";
            cardGrid.className = "grid w-full h-full gap-2 justify-center items-center";
            
            if (totalPairs === 3) cardGrid.classList.add("grid-cols-3", "max-w-md");
            else if (totalPairs === 4) cardGrid.classList.add("grid-cols-4");
            else if (totalPairs === 6) cardGrid.classList.add("grid-cols-4");
            else if (totalPairs === 8) cardGrid.classList.add("grid-cols-4");
            else if (totalPairs === 10) cardGrid.classList.add("grid-cols-5");
            else cardGrid.classList.add("grid-cols-6");

            const targetPool = difficultyWordPool[selectedDifficulty];
            const poolCopy = [...targetPool].sort(() => Math.random() - 0.5);
            const roundPairs = poolCopy.slice(0, totalPairs);

            cards = [];
            roundPairs.forEach(item => {
                cards.push({ word: item.word, type: "emoji", content: item.emoji, isFlipped: false, isMatched: false });
                cards.push({ word: item.word, type: "word", content: item.word, isFlipped: false, isMatched: false });
            });

            cards.sort(() => Math.random() - 0.5);

            cards.forEach((card, index) => {
                const element = createCardElement(card, index);
                cardGrid.appendChild(element);
            });

            setTimeout(triggerMemoryPreview, 400);
        }

        function triggerMemoryPreview() {
            lockBoard = true;
            statusDisplay.innerText = "👀 단어와 이모지를 빠르게 기억하세요!";
            stopBgm();
            
            cards.forEach((_, idx) => {
                document.getElementById(`card-inner-${idx}`).classList.add("flipped");
            });

            // 프리뷰 찬스 타임 (2.5초간은 타이머가 흐르지 않음)
            setTimeout(() => {
                if (!gameActive || isPaused) return;
                cards.forEach((card, idx) => {
                    document.getElementById(`card-inner-${idx}`).classList.remove("flipped");
                    card.isFlipped = false;
                });
                lockBoard = false;
                statusDisplay.innerText = "🎯 알맞은 이모지와 영단어를 짝지어보세요!";
                
                if (bgmEnabled) startBgm();
                startTimer(); // 프리뷰 조율이 끝난 후 공정하게 타이머 카운트 다운 개시!
            }, 2500);
        }

        function handleCardClick(index) {
            if (!gameActive || isPaused || lockBoard) return;
            const card = cards[index];
            if (card.isFlipped || card.isMatched) return;

            const inner = document.getElementById(`card-inner-${index}`);
            inner.classList.add("flipped");
            card.isFlipped = true;
            flippedCards.push({ card, index, inner });

            if (flippedCards.length === 2) checkPairMatch();
        }

        function checkPairMatch() {
            lockBoard = true;
            const [first, second] = flippedCards;

            if (first.card.word === second.card.word && first.card.type !== second.card.type) {
                setTimeout(() => {
                    first.inner.classList.replace("border-purple-300", "border-emerald-400");
                    first.inner.classList.add("ring-4", "ring-emerald-200");
                    second.inner.classList.replace("border-purple-300", "border-emerald-400");
                    second.inner.classList.add("ring-4", "ring-emerald-200");

                    first.card.isMatched = true; second.card.isMatched = true;

                    const addedScore = 100 * level * scoreMultiplier;
                    score += addedScore;
                    scoreText.innerText = score;
                    matchedPairs++;

                    statusDisplay.innerText = `✨ 정답! 단어 매칭 성공 (+${addedScore}점)`;
                    playSound('match');

                    flippedCards = []; lockBoard = false;

                    if (matchedPairs === totalPairs) {
                        stopTimer();
                        setTimeout(triggerLevelUp, 1000);
                    }
                }, 300);
            } else {
                // 오답 처리 및 시간 차등 패널티 감점 핵심 알고리즘
                const penaltyTime = 2 + scoreMultiplier; // 쉬움 3초, 보통 4초, 어려움 5초 감점
                timeLeft -= penaltyTime;
                if (timeLeft < 0) timeLeft = 0;
                updateTimerUI();

                statusDisplay.innerText = `❌ 다른 짝이에요! 시간 감점 (-${penaltyTime}초)`;
                playSound('wrong');

                setTimeout(() => {
                    first.inner.classList.remove("flipped");
                    second.inner.classList.remove("flipped");
                    first.card.isFlipped = false;
                    second.card.isFlipped = false;

                    flippedCards = []; lockBoard = false;

                    if (timeLeft <= 0) {
                        endGame();
                    } else {
                        // 감점 폭탄을 맞고 게임이 활성화 중이면 타이머 재수행 재조율
                        startTimer();
                    }
                }, 1100);
            }
        }

        function triggerLevelUp() {
            level++;
            levelText.innerText = level;
            statusDisplay.innerText = `🎉 레벨 업! 스테이지 ${level}로 진입합니다.`;
            playSound('levelup');
            buildRoundData();
        }

        function togglePause() {
            if (!gameActive || lockBoard) return;
            isPaused = !isPaused;

            if (isPaused) {
                stopBgm();
                stopTimer();
                pauseOverlay.classList.remove("hidden");
                pauseBtn.innerHTML = "▶️ 이어하기";
                pauseBtn.className = "px-4 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow transition transform active:scale-95 cursor-pointer whitespace-nowrap";
            } else {
                pauseOverlay.classList.add("hidden");
                pauseBtn.innerHTML = "⏸️ 일시정지";
                pauseBtn.className = "px-4 py-3 bg-fuchsia-500 hover:bg-fuchsia-600 text-white font-bold rounded-xl shadow transition transform active:scale-95 cursor-pointer whitespace-nowrap";
                if (bgmEnabled) startBgm();
                startTimer();
            }
        }

        function endGame() {
            gameActive = false; pauseBtn.disabled = true; 
            stopBgm(); stopTimer();
            document.getElementById("final-score").innerText = score;
            gameoverScreen.classList.remove("hidden");
            playSound('fail');
        }

        // --- 리스너 바인딩 부 ---
        document.getElementById("start-btn").addEventListener("click", startGame);
        document.getElementById("restart-btn").addEventListener("click", startGame);
        document.getElementById("home-btn").addEventListener("click", () => {
            stopTimer(); stopBgm(); gameActive = false;
            gameoverScreen.classList.add("hidden");
            startScreen.classList.remove("hidden");
        });
        pauseBtn.addEventListener("click", togglePause);
        document.getElementById("bgm-top-toggle").addEventListener("click", toggleBgm);
    </script>
</body>
</html>
