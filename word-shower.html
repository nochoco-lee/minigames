    <style>
        body {
            font-family: 'Jua', sans-serif;

        }

            transform: scale(1.02);
            transition: all 0.2s ease-in-out;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {

<body class="bg-indigo-50 h-screen w-screen flex items-center justify-center overflow-hidden p-4">

    <script>
        // --- 한국어 단어 풀 ---
        const koreanWordPool = [

            {text: "옥수수", emoji: "🌽"}, {text: "아이스크림", emoji: "🍦"}, {text: "피자", emoji: "🍕"}, 
            {text: "치킨", emoji: "🍗"}, {text: "과자", emoji: "🍪"}, {text: "햄버거", emoji: "🍔"}, 
            {text: "케이크", emoji: "🎂"}, {text: "우유", emoji: "🥛"}, {text: "자동차", emoji: "🚗"}, 
            {text: "비행기", emoji: "✈️"}, {text: "우주선", emoji: "🚀"}, {text: "자전거", emoji: "🚲"}, 
            {text: "무지개", emoji: "🌈"}, {text: "태양", emoji: "☀️"}, {text: "구름", emoji: "☁️"}, 
            {text: "달님", emoji: "🌙"}, {text: "반짝별", emoji: "⭐"}, {text: "지구", emoji: "🌍"}, 
            {text: "눈사람", emoji: "⛄"}, {text: "로봇", emoji: "🤖"}, {text: "풍선", emoji: "🎈"}, 
            {text: "우산", emoji: "☂️"}, {text: "선물", emoji: "🎁"}, {text: "연필", emoji: "✏️"}, 
            {text: "가방", emoji: "🎒"}, {text: "축구공", emoji: "⚽"}, {text: "피아노", emoji: "🎹"},
            {text: "안녕", emoji: "👋"}, {text: "고마워", emoji: "🙏"}, {text: "사랑해", emoji: "💖"},
            {text: "축하해", emoji: "🎉"}, {text: "화이팅", emoji: "💪"}, {text: "미안해", emoji: "🙇"},
            {text: "좋아", emoji: "👍"}, {text: "최고", emoji: "👑"}, {text: "행복", emoji: "🥰"},
            {text: "웃음", emoji: "😄"}, {text: "노래", emoji: "🎵"}, {text: "편지", emoji: "✉️"},
            {text: "친구", emoji: "🧑‍🤝‍🧑"}, {text: "가족", emoji: "👨‍👩‍👧‍👦"}, {text: "파티", emoji: "🥳"},
            {text: "바다", emoji: "🌊"}, {text: "새싹", emoji: "🌱"}, {text: "불꽃놀이", emoji: "🎆"}
        ];

        // --- 영어 단어 풀 ---
        const englishWordPool = [
            {text: "puppy", emoji: "🐶"}, {text: "cat", emoji: "🐱"}, {text: "lion", emoji: "🦁"}, 
            {text: "tiger", emoji: "🐯"}, {text: "rabbit", emoji: "🐰"}, {text: "monkey", emoji: "🐵"}, 
            {text: "panda", emoji: "🐼"}, {text: "penguin", emoji: "🐧"}, {text: "whale", emoji: "🐳"}, 
            {text: "frog", emoji: "🐸"}, {text: "apple", emoji: "🍎"}, {text: "banana", emoji: "🍌"}, 
            {text: "melon", emoji: "🍈"}, {text: "carrot", emoji: "🥕"}, {text: "corn", emoji: "🌽"}, 
            {text: "pizza", emoji: "🍕"}, {text: "chicken", emoji: "🍗"}, {text: "burger", emoji: "🍔"}, 
            {text: "cookie", emoji: "🍪"}, {text: "cake", emoji: "🎂"}, {text: "milk", emoji: "🥛"}, 
            {text: "car", emoji: "🚗"}, {text: "airplane", emoji: "✈️"}, {text: "rocket", emoji: "🚀"}, 
            {text: "robot", emoji: "🤖"}, {text: "balloon", emoji: "🎈"}, {text: "umbrella", emoji: "☂️"}, 
            {text: "gift", emoji: "🎁"}, {text: "pencil", emoji: "✏️"}, {text: "watch", emoji: "⌚"}, 
            {text: "rainbow", emoji: "🌈"}, {text: "sun", emoji: "☀️"}, {text: "cloud", emoji: "☁️"}, 
            {text: "star", emoji: "⭐"}, {text: "earth", emoji: "🌍"}, {text: "snowman", emoji: "⛄"}, 
            {text: "soccer", emoji: "⚽"}, {text: "guitar", emoji: "🎸"}, {text: "piano", emoji: "🎹"},
            {text: "hello", emoji: "👋"}, {text: "thanks", emoji: "🙏"}, {text: "love", emoji: "💖"},
            {text: "happy", emoji: "🥰"}, {text: "smile", emoji: "😄"}, {text: "party", emoji: "🥳"},
            {text: "friend", emoji: "🧑‍🤝‍🧑"}, {text: "family", emoji: "👨‍👩‍👧‍👦"}, {text: "music", emoji: "🎵"},
            {text: "sorry", emoji: "🙇"}, {text: "super", emoji: "👑"}, {text: "good", emoji: "👍"}
        ];

        let activeWordPool = koreanWordPool;

        // --- 영타 -> 한글 영문 조합 오토마타 엔진 ---
        function engToKor(src) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","요","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
            const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

            const choMap = {
                'r':0,'R':1,'s':2,'S':2,'e':3,'E':4,'f':5,'F':5,'a':6,'A':6,
                'q':7,'Q':8,'t':9,'T':10,'d':11,'D':11,'w':12,'W':13,'c':14,'C':14,
                'z':15,'Z':15,'x':16,'X':16,'v':17,'V':17,'g':18,'G':18
            };
            const jungMap = {
                'k':0,'K':0,'o':1,'O':3,'i':2,'I':2,'j':4,'J':4,'p':5,'P':7,
                'u':6,'U':6,'h':8,'H':8,'y':12,'Y':12,'n':13,'N':13,'b':17,'B':17,
                'm':18,'M':18,'l':20,'L':20
            };
            const jongMap = {
                'r':1,'R':2,'s':4,'S':4,'e':7,'f':8,'F':8,'a':16,'A':16,
                'q':17,'t':19,'T':20,'d':21,'D':21,'w':22,'c':23,'C':23,
                'z':24,'Z':24,'x':25,'X':25,'v':26,'V':26,'g':27,'G':27
            };

            const complexJung = {'hk':9,'ho':10,'hl':11,'nj':14,'np':15,'nl':16,'ml':19};
            const complexJong = {'rt':3,'sw':5,'sg':6,'fr':9,'fa':10,'fq':11,'ft':12,'fx':13,'fv':14,'fg':15,'qt':18};
            
            const compatJamo = {
                'r':'ㄱ','R':'ㄲ','s':'ㄴ','S':'ㄴ','e':'ㄷ','E':'ㄸ','f':'ㄹ','F':'ㄹ','a':'ㅁ','A':'ㅁ',
                'q':'ㅂ','Q':'ㅃ','t':'ㅅ','T':'ㅆ','d':'ㅇ','D':'ㅇ','w':'ㅈ','W':'ㅉ','c':'ㅊ','C':'ㅊ',
                'z':'ㅋ','Z':'ㅋ','x':'ㅌ','X':'ㅌ','v':'ㅍ','V':'ㅍ','g':'ㅎ','G':'ㅎ'
            };

            let result = "";
            let i = 0;

            while (i < src.length) {
                let c = src[i];
                if (choMap[c] !== undefined) {
                    let cIdx = choMap[c];
                    let jIdx = -1;
                    let jgIdx = 0;

                    if (i + 1 < src.length && jungMap[src[i+1]] !== undefined) {
                        let v1 = src[i+1];
                        let vIdx = jungMap[v1];
                        i += 2;
                        
                        if (i < src.length && jungMap[src[i]] !== undefined) {
                            let v2 = src[i];
                            let lookupV1 = (v1 === 'O' || v1 === 'P') ? v1 : v1.toLowerCase();
                            let lookupV2 = (v2 === 'O' || v2 === 'P') ? v2 : v2.toLowerCase();
                            if (complexJung[lookupV1 + lookupV2] !== undefined) {
                                vIdx = complexJung[lookupV1 + lookupV2];
                                i++;
                            }
                        }
                        jIdx = vIdx;

                        if (i < src.length && choMap[src[i]] !== undefined) {
                            let l1 = src[i];
                            let nextIsVowel = (i + 1 < src.length && jungMap[src[i+1]] !== undefined);
                            
                            if (!nextIsVowel) {
                                if (jongMap[l1] !== undefined) {
                                    let tempJgIdx = jongMap[l1];
                                    i++;
                                    
                                    if (i < src.length && choMap[src[i]] !== undefined) {
                                        let l2 = src[i];
                                        let nextNextIsVowel = (i + 1 < src.length && jungMap[src[i+1]] !== undefined);
                                        if (!nextNextIsVowel) {
                                            let lookupL1 = ('REQTW'.includes(l1)) ? l1 : l1.toLowerCase();
                                            let lookupL2 = ('REQTW'.includes(l2)) ? l2 : l2.toLowerCase();
                                            if (complexJong[lookupL1 + lookupL2] !== undefined) {
                                                tempJgIdx = complexJong[lookupL1 + lookupL2];
                                                i++;
                                            }
                                        }
                                    }
                                    jgIdx = tempJgIdx;
                                }
                            }
                        }
                        result += String.fromCharCode(44032 + (cIdx * 588) + (jIdx * 28) + jgIdx);
                    } else {
                        result += compatJamo[c] || c;
                        i++;
                    }
                } else if (jungMap[c] !== undefined) {
                    let v1 = src[i];
                    let vIdx = jungMap[v1];
                    i++;
                    if (i < src.length && jungMap[src[i]] !== undefined) {
                        let v2 = src[i];
                        let lookupV1 = (v1 === 'O' || v1 === 'P') ? v1 : v1.toLowerCase();
                        let lookupV2 = (v2 === 'O' || v2 === 'P') ? v2 : v2.toLowerCase();
                        if (complexJung[lookupV1 + lookupV2] !== undefined) {
                            vIdx = complexJung[lookupV1 + lookupV2];
                            i++;
                        }
                    }
                    result += jung[vIdx];
                } else {
                    result += c;
                    i++;
                }
            }
            return result;
        }

        // --- 오디오 및 BGM 엔진 ---
        let audioCtx = null;
        let bgmIntervalId = null;
        let bgmNoteIndex = 0;
        let bgmEnabled = true;

        const bgmMelody = [
            261.63, 329.63, 392.00, 523.25, 440.00, 392.00, 329.63, 293.66,
            329.63, 392.00, 440.00, 523.25, 587.33, 523.25, 440.00, 392.00,
            440.00, 392.00, 329.63, 261.63, 293.66, 329.63, 392.00, 329.63,
            293.66, 261.63, 220.00, 261.63, 293.66, 392.00, 293.66, 261.63
        ];

        function startBgm() {
            if (!bgmEnabled || isPaused || !gameActive) return;
            if (bgmIntervalId) return;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            bgmIntervalId = setInterval(() => {
                if (!gameActive || isPaused || !bgmEnabled) {
                    stopBgm();
                    return;
                }
                
                let freq = bgmMelody[bgmNoteIndex % bgmMelody.length];
                bgmNoteIndex++;

                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                let baseVol = freezeTimer > 0 ? 0.008 : 0.02; 
                gainNode.gain.setValueAtTime(baseVol, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            }, 220);
        }

        function stopBgm() {
            if (bgmIntervalId) {
                clearInterval(bgmIntervalId);
                bgmIntervalId = null;
            }
        }

        function toggleBgm() {
            bgmEnabled = !bgmEnabled;
            const topBgmBtn = document.getElementById("bgm-top-toggle");
            const startBgmCheckbox = document.getElementById("bgm-checkbox");

            if (bgmEnabled) {
                topBgmBtn.innerHTML = "🎵 음악 ON";
                topBgmBtn.classList.replace("text-gray-400", "text-indigo-700");
                startBgmCheckbox.checked = true;
                if (gameActive && !isPaused) startBgm();
            } else {
                topBgmBtn.innerHTML = "🔇 음악 OFF";
                topBgmBtn.classList.replace("text-indigo-700", "text-gray-400");
                startBgmCheckbox.checked = false;
                stopBgm();
            }
        }

        function playSound(type, wordText = "") {
            try {
                if (!window.AudioContext && !window.webkitAudioContext) return;
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const now = audioCtx.currentTime;

                if (type === 'match') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    const scale = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51]; 
                    let hash = 0;
                    for (let i = 0; i < wordText.length; i++) hash += wordText.charCodeAt(i);
                    const baseFreq = scale[hash % scale.length];

                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(baseFreq, now);
                    osc.frequency.setValueAtTime(baseFreq * 1.25, now + 0.05); 
                    osc.frequency.setValueAtTime(baseFreq * 1.5, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);

                } else if (type === 'wrong') {
                    // 🎯 단어가 틀렸을 때 (매치 실패) - 짧고 둔탁한 8비트 오답 버저 사운드
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(160, now);
                    osc.frequency.linearRampToValueAtTime(110, now + 0.1);
                    
                    gain.gain.setValueAtTime(0.08, now); // 귀에 부담 없도록 작게 설정
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    
                    osc.start(now); osc.stop(now + 0.12);

                } else if (type === 'freeze') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(880, now);
                    osc.frequency.exponentialRampToValueAtTime(1760, now + 0.4);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);

                } else if (type === 'fail') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now);
                    osc.frequency.linearRampToValueAtTime(110, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);

                } else if (type === 'levelup') {
                    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
                    notes.forEach((freq, index) => {
                        const osc1 = audioCtx.createOscillator();
                        const osc2 = audioCtx.createOscillator();
                        const noteGain = audioCtx.createGain();
                        
                        osc1.type = 'triangle';
                        osc2.type = 'square'; 
                        
                        osc1.frequency.setValueAtTime(freq, now + index * 0.07);
                        osc2.frequency.setValueAtTime(freq * 1.004, now + index * 0.07); 
                        
                        noteGain.gain.setValueAtTime(0, now + index * 0.07);
                        noteGain.gain.linearRampToValueAtTime(0.12, now + index * 0.07 + 0.02);
                        noteGain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.07 + 0.3);
                        
                        osc1.connect(noteGain);
                        osc2.connect(noteGain);
                        noteGain.connect(audioCtx.destination);
                        
                        osc1.start(now + index * 0.07);
                        osc1.stop(now + index * 0.07 + 0.3);
                        osc2.start(now + index * 0.07);
                        osc2.stop(now + index * 0.07 + 0.3);
                    });
                }
            } catch (e) { console.warn(e); }
        }

        // --- 전역 UI 셋업 ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("score-text");
        const levelText = document.getElementById("level-text");
        const hpContainer = document.getElementById("hp-container");
        const wordInput = document.getElementById("wordInput");
        const pauseBtn = document.getElementById("pause-btn");
        const pauseOverlay = document.getElementById("pause-overlay");
        const startScreen = document.getElementById("start-screen");
        const gameoverScreen = document.getElementById("gameover-screen");
        const freezeOverlay = document.getElementById("freeze-overlay");
        const freezeBgEffect = document.getElementById("freeze-bg-effect");
        const startLevelInput = document.getElementById("start-level-input");
        const bgmTopToggle = document.getElementById("bgm-top-toggle");

        let score = 0; let level = 1; let hp = 5;
        let words = []; let particles = []; let clouds = [];
        let gameActive = false; let isPaused = false;
        let pauseStartTime = 0; let spawnInterval = 4500; 
        let lastSpawnTime = 0; let freezeTimer = 0;
        
        let currentGameLang = "ko"; 
        let isSnailMode = false;     
        
        let leftText = "";           
        let currentComposition = ""; 
        let rightText = "";          

        for(let i=0; i<3; i++) {
            clouds.push({ x: Math.random() * canvas.width, y: Math.random() * 60 + 20, speed: Math.random() * 0.1 + 0.05, size: Math.random() * 25 + 15 });
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.size = Math.random() * 4 + 2;
                this.speedX = Math.random() * 5 - 2.5; this.speedY = Math.random() * -4 - 1;
                this.gravity = 0.15; this.color = color; this.alpha = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.speedY += this.gravity; this.alpha -= 0.03; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
        }

        function createWord() {
            if (activeWordPool.length === 0 || words.length >= 5) return;

            const baseWord = activeWordPool[Math.floor(Math.random() * activeWordPool.length)];
            if (words.some(w => w.text === baseWord.text)) return;

            const isSpecial = Math.random() < 0.15; 
            
            ctx.font = "bold 17px 'Jua'";
            const textWidthEstimate = ctx.measureText(baseWord.text).width + 26;
            const x = Math.random() * (canvas.width - textWidthEstimate - 40) + 20;

            const baseFallSpeed = Math.random() * 0.03 + 0.08; 
            const speedMultiplier = 1 + (level - 1) * 0.15;

            words.push({
                text: baseWord.text, emoji: baseWord.emoji, x: x, y: -35,
                speed: baseFallSpeed * speedMultiplier, isSpecial: isSpecial, spawnTime: Date.now()
            });
        }

        function gameLoop(timestamp) {
            if (!gameActive) return;
            if (isPaused) { requestAnimationFrame(gameLoop); return; }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            clouds.forEach(cloud => {
                cloud.x += cloud.speed; if (cloud.x > canvas.width + 40) cloud.x = -40;
                ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
                ctx.beginPath(); ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2); ctx.fill();
            });

            ctx.fillStyle = "#A7F3D0"; ctx.fillRect(0, canvas.height - 35, canvas.width, 35);
            ctx.fillStyle = "#34D399"; ctx.fillRect(0, canvas.height - 35, canvas.width, 5);

            if (freezeTimer > 0) {
                freezeTimer -= 16.67;
                if (freezeTimer <= 0) {
                    freezeOverlay.classList.add("hidden");
                    freezeBgEffect.classList.add("hidden");
                }
            }

            if (words.length === 0) {
                createWord(); 
                lastSpawnTime = timestamp;
            } else if (timestamp - lastSpawnTime > spawnInterval) {
                let safeToSpawn = true;
                
                if (Math.random() > 0.15) {
                    for (let i = 0; i < words.length; i++) {
                        if (words[i].y < 60) { 
                            safeToSpawn = false;
                            break;
                        }
                    }
                }

                if (safeToSpawn) {
                    createWord(); 
                    lastSpawnTime = timestamp;
                }
            }

            for (let i = words.length - 1; i >= 0; i--) {
                const w = words[i];

                if (freezeTimer <= 0) {
                    w.y += w.speed * (isSnailMode ? 0.5 : 1.0);
                }

                if (w.y > canvas.height - 58) {
                    words.splice(i, 1); hp--; updateHpDisplay(); playSound('fail');
                    if (hp <= 0) endGame();
                    continue;
                }

                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.06)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 2;
                ctx.fillStyle = w.isSpecial ? "#E0F2FE" : "#FFFFFF";
                ctx.strokeStyle = w.isSpecial ? "#38BDF8" : "#E2E8F0"; ctx.lineWidth = 2;

                ctx.font = "bold 17px 'Jua'";
                const textWidth = ctx.measureText(w.text).width;
                const bubbleWidth = textWidth + 26; const bubbleHeight = 34;
                
                roundRect(ctx, w.x, w.y, bubbleWidth, bubbleHeight, 17, true, true);
                ctx.restore();

                ctx.fillStyle = w.isSpecial ? "#0369A1" : "#374151";
                ctx.fillText(w.text, w.x + 13, w.y + 23);
                ctx.font = "20px 'Jua'"; ctx.fillText(w.emoji, w.x + (bubbleWidth / 2) - 11, w.y - 6);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
            if (fill) ctx.fill(); if (stroke) ctx.stroke();
        }

        function forceCommit() {
            if (currentComposition.length > 0) {
                leftText += engToKor(currentComposition);
                currentComposition = "";
                rightText = "";
            }
        }
        wordInput.addEventListener("click", forceCommit);
        wordInput.addEventListener("keyup", function(e) {
            if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Home", "End"].includes(e.key)) {
                forceCommit();
            }
        });

        wordInput.addEventListener("keydown", function(e) {
            if (!gameActive || isPaused) return;

            if (currentGameLang === "ko") {
                let pos = wordInput.selectionStart;

                if (e.key === "Backspace") {
                    e.preventDefault();
                    
                    if (currentComposition.length > 0) {
                        currentComposition = currentComposition.slice(0, -1);
                        wordInput.value = leftText + engToKor(currentComposition) + rightText;
                        let newPos = leftText.length + engToKor(currentComposition).length;
                        wordInput.setSelectionRange(newPos, newPos);
                    } else {
                        leftText = wordInput.value.slice(0, pos);
                        rightText = wordInput.value.slice(pos);
                        
                        if (leftText.length > 0) {
                            leftText = leftText.slice(0, -1);
                            wordInput.value = leftText + rightText;
                            wordInput.setSelectionRange(pos - 1, pos - 1);
                        }
                    }

                } else if (e.key === "Enter") {
                    e.preventDefault();
                    submitWord(wordInput.value.trim());
                    clearInputBuffer();
                } else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                    e.preventDefault();
                    
                    if (currentComposition.length === 0) {
                        leftText = wordInput.value.slice(0, pos);
                        rightText = wordInput.value.slice(pos);
                    }

                    let fullBuffer = currentComposition + e.key;
                    let kor = engToKor(fullBuffer);
                    
                    if (kor.length > 1) {
                        let char0 = kor[0];
                        let prefixLen = 1;
                        
                        for (let len = 1; len <= fullBuffer.length; len++) {
                            if (engToKor(fullBuffer.slice(0, len)) === char0) {
                                prefixLen = len;
                            }
                        }
                        
                        leftText += char0;
                        currentComposition = fullBuffer.slice(prefixLen);
                    } else {
                        currentComposition = fullBuffer;
                    }
                    
                    wordInput.value = leftText + engToKor(currentComposition) + rightText;
                    let newPos = leftText.length + engToKor(currentComposition).length;
                    wordInput.setSelectionRange(newPos, newPos);
                }
            } else {
                if (e.key === "Enter") {
                    e.preventDefault();
                    submitWord(wordInput.value.trim());
                    wordInput.value = "";
                }
            }
        });

        function clearInputBuffer() {
            leftText = "";
            currentComposition = "";
            rightText = "";
            wordInput.value = "";
        }

        function submitWord(typedText) {
            if (typedText.length === 0) return; // 아무것도 안 적고 엔터 친 경우는 사운드 미발생

            let matchedIndex = -1;
            for (let i = 0; i < words.length; i++) {
                if (words[i].text.toLowerCase() === typedText.toLowerCase()) {
                    matchedIndex = i; break;
                }
            }

            if (matchedIndex !== -1) {
                const matchedWord = words[matchedIndex];
                const timeElapsed = Date.now() - matchedWord.spawnTime;
                
                let gainedScore = 2; 
                if (timeElapsed < 4000) gainedScore = 4; 
                else if (timeElapsed < 8000) gainedScore = 3;

                if (matchedWord.isSpecial) {
                    gainedScore += 2; triggerFreeze();
                } else {
                    playSound('match', matchedWord.text);
                }

                score += gainedScore; scoreText.innerText = score;

                const pColor = matchedWord.isSpecial ? "#38BDF8" : "#F472B6";
                for (let p = 0; p < 12; p++) {
                    particles.push(new Particle(matchedWord.x + 30, matchedWord.y + 17, pColor));
                }

                words.splice(matchedIndex, 1);
                checkLevelUp();
            } else {
                // 🎯 매치되는 단어가 없을 때 (오답 입력 시) 사운드 재생
                playSound('wrong');
            }
        }

        function triggerFreeze() {
            freezeTimer = 5000; 
            freezeOverlay.classList.remove("hidden"); 
            freezeBgEffect.classList.remove("hidden");
            playSound('freeze');
        }

        function checkLevelUp() {
            let targetLevel = Math.floor(score / 100) + 1;
            if (targetLevel > level) {
                level = targetLevel; levelText.innerText = level;
                spawnInterval = Math.max(1800, 4500 - (level * 250));
                playSound('levelup');
                hp = 5; updateHpDisplay();
            }
        }

        function updateHpDisplay() {
            let hearts = "";
            for (let i = 0; i < 5; i++) {
                if (i < hp) {
                    hearts += `<span class="text-2xl text-red-500 drop-shadow-sm select-none">❤️</span>`;
                } else {
                    hearts += `<span class="text-2xl opacity-20 filter grayscale select-none">❤️</span>`;
                }
            }
            hpContainer.innerHTML = hearts;
        }

        function togglePause() {
            if (!gameActive) return;
            isPaused = !isPaused;

            if (isPaused) {
                pauseStartTime = performance.now();
                wordInput.disabled = true;
                pauseBtn.innerHTML = "▶️ 이어하기";
                pauseBtn.classList.replace("bg-amber-500", "bg-green-500");
                pauseBtn.classList.replace("hover:bg-amber-600", "hover:bg-green-600");
                pauseOverlay.classList.remove("hidden");
                stopBgm(); 
            } else {
                const pauseDuration = performance.now() - pauseStartTime;
                lastSpawnTime += pauseDuration;
                wordInput.disabled = false; wordInput.focus();
                pauseBtn.innerHTML = "⏸️ 일시정지";
                pauseBtn.classList.replace("bg-green-500", "bg-amber-500");
                pauseBtn.classList.replace("hover:bg-green-600", "hover:bg-amber-600");
                pauseOverlay.classList.add("hidden");
                if (bgmEnabled) startBgm(); 
            }
        }

        function startGame() {
            try {
                if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) { console.warn(e); }

            currentGameLang = document.querySelector('input[name="langSelect"]:checked').value;
            activeWordPool = (currentGameLang === "ko") ? koreanWordPool : englishWordPool;
            isSnailMode = document.getElementById("snail-mode-checkbox").checked;
            
            bgmEnabled = document.getElementById("bgm-checkbox").checked;
            if (bgmEnabled) {
                bgmTopToggle.innerHTML = "🎵 음악 ON";
                bgmTopToggle.className = "text-sm bg-white hover:bg-indigo-100 text-indigo-700 font-bold px-2.5 py-1 rounded-xl border border-indigo-300 shadow-sm transition active:scale-95 cursor-pointer whitespace-nowrap";
            } else {
                bgmTopToggle.innerHTML = "🔇 음악 OFF";
                bgmTopToggle.className = "text-sm bg-white hover:bg-indigo-100 text-gray-400 font-bold px-2.5 py-1 rounded-xl border border-indigo-300 shadow-sm transition active:scale-95 cursor-pointer whitespace-nowrap";
            }

            let selectedLevel = parseInt(startLevelInput.value) || 1;
            if (selectedLevel < 1) selectedLevel = 1;
            
            level = selectedLevel; score = (level - 1) * 100; hp = 5;
            words = []; particles = []; 
            clearInputBuffer();
            
            spawnInterval = Math.max(1800, 4500 - (level * 250));
            
            scoreText.innerText = score; levelText.innerText = level; updateHpDisplay();
            
            startScreen.classList.add("hidden");
            gameoverScreen.classList.add("hidden");
            pauseOverlay.classList.add("hidden");
            freezeOverlay.classList.add("hidden");
            freezeBgEffect.classList.add("hidden");
            
            wordInput.disabled = false; wordInput.focus();
            wordInput.placeholder = (currentGameLang === "ko") ? "🎯 단어를 입력하세요!" : "🎯 Type the word here!";

            pauseBtn.disabled = false; isPaused = false;
            pauseBtn.innerHTML = "⏸️ 일시정지";
            pauseBtn.className = "px-4 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl shadow transition transform active:scale-95 whitespace-nowrap cursor-pointer";
            
            gameActive = true; 
            bgmNoteIndex = 0; 
            if (bgmEnabled) startBgm(); 
            
            createWord(); 
            lastSpawnTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false; wordInput.disabled = true; pauseBtn.disabled = true;
            stopBgm(); 
            document.getElementById("final-score").innerText = score;
            gameoverScreen.classList.remove("hidden");
        }

        function goHome() {
            gameoverScreen.classList.add("hidden");
            startScreen.classList.remove("hidden");
        }

        document.getElementById("start-btn").addEventListener("click", startGame);
        document.getElementById("restart-btn").addEventListener("click", startGame);
        document.getElementById("home-btn").addEventListener("click", goHome);
        pauseBtn.addEventListener("click", togglePause);
        bgmTopToggle.addEventListener("click", toggleBgm);
    </script>
</body>
</html>
